<div *ngIf="!isMobile; else mobileView" class="hero-container flex-center-row">
  <div class="hero-content">
    <div class="hero-image-container">
      <img
        class="hero-image"
        ngSrc="assets/images/headshot.webp"
        width="1137"
        height="1707"
        alt="Headshot of Kaitlyn Forks"
        priority
      />
    </div>
    <div class="hero-text">
      <h1 class="hero-title">I'm Kaitlyn Forks</h1>
      <p class="hero-description">
        I specialize in scalable, light-weight applications built with Angular,
        Node.js & AWS Cloud Services
      </p>
      <button mat-flat-button>
        <a
          href="assets/files/2025.ForksKaitlyn.Resume.pdf"
          download="Kaitlyn_Forks_Resume.pdf"
        >
          Download my resume
        </a>
      </button>
    </div>
  </div>
</div>

<ng-template #mobileView>
  <div class="hero-container-mobile flex-column">
    <div class="hero-text-mobile">
      <h1 class="hero-title-mobile">I'm Kaitlyn Forks</h1>
      <p class="hero-description-mobile">
        I specialize in scalable, light-weight applications built with Angular,
        Node.js & AWS Cloud Services
      </p>
      <button mat-flat-button>
        <a
          href="assets/files/2025.ForksKaitlyn.Resume.pdf"
          download="Kaitlyn_Forks_Resume.pdf"
        >
          Download my resume
        </a>
      </button>
    </div>
    <div class="hero-image-container-mobile">
      <img
        class="hero-image-mobile"
        ngSrc="assets/images/headshot.webp"
        width="1137"
        height="1707"
        alt="Headshot of Kaitlyn Forks"
        priority
      />
    </div>
  </div>
</ng-template>

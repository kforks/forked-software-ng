<nav class="scifi-nav">
  <!-- Left: logo + system id -->
  <a routerLink="/home" class="brand">
    <img
      ngSrc="assets/wt-logo.svg"
      width="28"
      height="28"
      alt="Forked Software logo"
      class="brand-logo"
      priority
    />
    <span class="brand-text">
      <span class="brand-name hot">FORKED.SOFTWARE</span>
      <span class="brand-meta mono">TERMINAL v0.2 // {{ routeLabel() }}</span>
    </span>
  </a>

  <!-- Center: nav links -->
  <ul class="nav-links">
    @for (link of navLinks; track link.url) {
      <li>
        @if (link.disabled) {
          <span class="nav-link is-disabled mono"
            >{{ link.label }} <span class="nav-tag">SOON</span></span
          >
        } @else {
          <a
            [routerLink]="link.url"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: link.url === '/home' }"
            class="nav-link mono"
          >
            {{ link.label }}
          </a>
        }
      </li>
    }
  </ul>

  <!-- Right: status + controls -->
  <div class="nav-right">
    <span class="status-readout mono">
      <span class="status-dot" aria-hidden="true"></span>
      ACCEPTING ENGAGEMENTS
    </span>

    <span class="timestamp mono" aria-label="Current UTC time">{{
      timestamp
    }}</span>

    <button
      type="button"
      class="icon-btn"
      (click)="toggleTheme()"
      aria-label="Toggle theme"
      title="Toggle theme"
    >
      <fa-icon [icon]="faAdjust"></fa-icon>
    </button>

    <button
      type="button"
      class="icon-btn"
      (click)="openLinkedIn()"
      aria-label="LinkedIn"
      title="LinkedIn"
    >
      <fa-icon [icon]="faLinkedin"></fa-icon>
    </button>
  </div>
</nav>

<mat-toolbar>

  <!-- Main Nav Row -->
  <mat-toolbar-row class="primary-nav">
    <div class="margin-left-lg">
      <img style="vertical-align: middle" ngSrc="assets/wt-logo.svg" alt="Logo" height="30" width="30" class="margin-right-sm">
      <span>Kaitlyn Forks</span>
    </div>

    <div class="nav-links">
      <span
        class="margin-left-lg"
        (mouseenter)="setActiveLink('About')"
        (mouseleave)="setActiveLink(null)">
        About
      </span>
      <span
        class="margin-left-lg"
        (mouseenter)="setActiveLink('Portfolio')"
        (mouseleave)="setActiveLink(null)">
        Portfolio
      </span>
      <span
        class="margin-left-lg"
        (mouseenter)="setActiveLink('Resume')"
        (mouseleave)="setActiveLink(null)">
        Resume
      </span>
    </div>

    <div class="nav-icons">
      <!-- Share Button -->
      <button mat-icon-button aria-label="share" (click)="copyUrlToClipboard()" [matTooltip]="'Share'">
        <fa-icon [icon]="faShare"></fa-icon>
      </button>
      <!-- LinkedIn Button -->
      <button mat-icon-button aria-label="linkedin" (click)="openLinkedIn()" [matTooltip]="'LinkedIn'">
        <fa-icon [icon]="faLinkedin"></fa-icon>
      </button>
    </div>
  </mat-toolbar-row>

  <!-- Secondary Nav Row -->
  <mat-toolbar-row *ngIf="activeLink" class="secondary-nav">
    <ng-container [ngSwitch]="activeLink">
      <div *ngSwitchCase="'About'">
        <span>About Us</span>
        <span>Our Team</span>
        <span>History</span>
      </div>
      <div *ngSwitchCase="'Portfolio'">
        <span>Projects</span>
        <span>Gallery</span>
        <span>Case Studies</span>
      </div>
      <div *ngSwitchCase="'Resume'">
        <span>Experience</span>
        <span>Education</span>
        <span>Skills</span>
      </div>
    </ng-container>
  </mat-toolbar-row>
</mat-toolbar>

<mat-toolbar>
  <!-- Main Nav Row -->
  <mat-toolbar-row class="primary-nav">
    <div class="margin-left-lg">
      <img style="vertical-align: middle" ngSrc="assets/wt-logo.svg" alt="Logo" height="30" width="30" class="margin-right-sm">
      <span>Kaitlyn Forks</span>
    </div>

    <div
      class="nav-links-wrapper nav-links margin-left-xl"
      (mouseenter)="setPrimaryLink(activePrimaryLink)"
      (mouseleave)="delayedClearPrimaryLink()">
      <span
        class="margin-left-lg"
        [class.active]="activePrimaryLink === 'About'"
        (mouseenter)="setPrimaryLink('About')">
        About
      </span>
      <span
        class="margin-left-lg"
        [class.active]="activePrimaryLink === 'Portfolio'"
        (mouseenter)="setPrimaryLink('Portfolio')">
        Portfolio
      </span>
      <span
        class="margin-left-lg"
        [class.active]="activePrimaryLink === 'Resume'"
        (mouseenter)="setPrimaryLink('Resume')">
        Resume
      </span>
    </div>

    <div class="nav-icons">
      <!-- Share Button -->
      <button mat-icon-button aria-label="share" (click)="copyUrlToClipboard()" [matTooltip]="'Share'">
        <fa-icon [icon]="faShare"></fa-icon>
      </button>
      <!-- LinkedIn Button -->
      <button mat-icon-button aria-label="linkedin" (click)="openLinkedIn()" [matTooltip]="'LinkedIn'">
        <fa-icon [icon]="faLinkedin"></fa-icon>
      </button>
    </div>
  </mat-toolbar-row>

  <!-- Secondary Nav Row -->
  <mat-toolbar-row
    *ngIf="activePrimaryLink"
    class="secondary-nav nav-links padding-right-xl"
    (mouseenter)="setSecondaryLink(activePrimaryLink)"
    (mouseleave)="clearSecondaryLink()">
    <ng-container [ngSwitch]="activeSecondaryLink">
      <div *ngSwitchCase="'About'">
        <span>About Us</span>
        <span>Our Team</span>
        <span>History</span>
      </div>
      <div *ngSwitchCase="'Portfolio'">
        <span>Projects</span>
        <span>Gallery</span>
        <span>Case Studies</span>
      </div>
      <div *ngSwitchCase="'Resume'">
        <span>Experience</span>
        <span>Education</span>
        <span>Skills</span>
      </div>
    </ng-container>
  </mat-toolbar-row>
</mat-toolbar>

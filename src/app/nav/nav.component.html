<mat-toolbar>
  <!-- Main Nav Row -->
  <mat-toolbar-row
    class="primary-nav"
    (mouseenter)="enterNav()"
    (mouseleave)="leaveNav()">
    <div class="margin-left-lg">
      <img
        style="vertical-align: middle"
        ngSrc="assets/wt-logo.svg"
        alt="Logo"
        height="30"
        width="30"
        class="margin-right-xl">
      <span>Kaitlyn Forks - Full Stack Software Engineer</span>
    </div>

    <div
      class="nav-links-wrapper nav-links"
      (mouseenter)="enterNav()"
      (mouseleave)="leaveNav()">
      <span
        class="margin-left-lg"
        [class.active]="activePrimaryLink === 'About'"
        (mouseenter)="setPrimaryLink('About')">
        About
      </span>
      <span
        class="margin-left-lg"
        [class.active]="activePrimaryLink === 'Portfolio'"
        (mouseenter)="setPrimaryLink('Portfolio')">
        Portfolio
      </span>
      <span
        class="margin-left-lg"
        [class.active]="activePrimaryLink === 'Resume'"
        (mouseenter)="setPrimaryLink('Resume')">
        Resume
      </span>
    </div>

    <div class="padding-right-lg">
      <!-- Share Button -->
      <button
        mat-icon-button
        aria-label="share"
        (click)="copyUrlToClipboard()"
        [matTooltip]="'Share'">
        <fa-icon [icon]="faShare"></fa-icon>
      </button>
      <!-- LinkedIn Button -->
      <button class="margin-left-md"
        mat-icon-button
        aria-label="linkedin"
        (click)="openLinkedIn()"
        [matTooltip]="'LinkedIn'">
        <fa-icon [icon]="faLinkedin"></fa-icon>
      </button>
    </div>
  </mat-toolbar-row>

  <!-- Secondary Nav Row -->
  <mat-toolbar-row
    *ngIf="activePrimaryLink && showSecondaryNav"
    class="secondary-nav"
    (mouseenter)="enterNav()"
    (mouseleave)="leaveNav()">
    <ng-container [ngSwitch]="activeSecondaryLink">
      <div *ngSwitchCase="'About'">
        <span>About The Dev</span>
        <span>Career Journey</span>
      </div>
      <div *ngSwitchCase="'Portfolio'">
        <span>Projects</span>
        <span>Gallery</span>
        <span>Awards and Recognitions</span>
      </div>
      <div *ngSwitchCase="'Resume'">
        <span>View</span>
        <span>Download</span>
      </div>
    </ng-container>
  </mat-toolbar-row>
</mat-toolbar>

<mat-toolbar class="kf-toolbar">
  <!-- Menu Button -->
  <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon">
    <mat-icon>menu</mat-icon>
  </button>

  <!-- Title -->
  <span class="example-spacer"></span>
  <fa-icon [icon]="faMicrochip"></fa-icon>
  <span>Kaitlyn Forks</span>
  <fa-icon [icon]="faCodeFork"></fa-icon>
  <span class="example-spacer"></span>

  <!-- Share Button -->
  <button mat-icon-button aria-label="share" (click)="copyUrlToClipboard()">
    <mat-icon>share</mat-icon>
  </button>

  <!-- LinkedIn Button -->
  <button mat-icon-button aria-label="linkedin" (click)="openLinkedIn()">
    <fa-icon [icon]="faLinkedin"></fa-icon>
  </button>
</mat-toolbar>

name: Deploy to AWS S3

on:
  push:
    branches:
      - main  # Triggers the workflow when changes are pushed to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'  # Use the version your Angular app requires

    - name: Install dependencies
      run: npm install  # Installs all dependencies from package-lock.json

    - name: Build Angular app
      run: npm run build --prod  # Adjust if you're using a different build command

    - name: Deploy to S3
      uses: jakejarvis/s3-sync-action@v0.5.1
      with:
        args: --acl public-read --follow-symlinks --delete
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: us-east-1  # Replace with your bucket's region if different
        SOURCE_DIR: dist/forked-software-ng  # Path to your Angular build files
        DEST_DIR: s3://forked-software-ng  # Your S3 bucket name
